[pytest]


# 配置执行的用例位置
testpaths = ./testcase/

# 配置修改默认的模块规则
python_files = test_*.py

# 配置修改默认的类规则
python_classes = Test*

# 配置修改默认的用例规则
python_functions = test_*

# 配置基础路径
base_url = ''

;host = https://test12.ys7.com

# 标记
markers =
    smoke: 冒烟用例
    p0: 核心主流程（20%）
    p1: 重要分支/边界（40%）
    p2: 异常/容错（30%）
    p3: 极端/探索（<10%）