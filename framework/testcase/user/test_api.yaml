- basicInfo:
    api_name: 用户登录v2
    url: /v3/users/login/v2
    method: post
    content_type: application/x-www-form-urlencoded
    headers:
      Content-Type: application/x-www-form-urlencoded
      clientType: "3"
      clientVersion: "1.3.4.211015"
      featureCode: 8792188c8dcbe6d137d8f15307de8d5c
      appId: 377f3df63b2e41bf8625d955f0acd3ae
      language: zh_CN

  testcases:
    - case_name: 用户输入正确账号密码登陆成功
      tags:
        - p0 # 用例等级：p0核心主流程（20%）、p1重要分支/边界（40%）、p2异常/容错（30%）、p3极端/探索（<10%，基本不自动化）
        - smoke # 冒烟
        - regression # 回归
      data:
        account: "{{account}}"
        cuName: U00tRzk3MzA=
        featureCode: efd3bfa68baea69842723798a679c782
        imageCode:
        latitude: "0.0"
        longitude: "0.0"
        msgType: "1"
        password: "{{password}}"
        smsCode:
        smsToken:
        pushRegisterJson: "[{\"channel\":99}]"
      file_name:

      extracts:
        - sessionId: [sessionInfo.sessionId]
        - rfSessionId: [sessionInfo.rfSessionId]
        - userId: [sessionInfo.userId]
        - userName: [sessionInfo.userName]

      api_validate:
        - eq: [status_code, 200]
        - eq: [meta.code, 200]
        - len_eq: [sessionInfo.userId, 32]
        - not_null: [sessionInfo.sessionId]
        - not_null: [sessionInfo.rfSessionId]

      db_validate:
        - sql: "SELECT user_id, password FROM user.user_info WHERE account = '{{account}}' and username = '${userName}';"
          validate:
            - not_null: [db_user_id]
            - eq: ["${userId}", db_user_id]
            - eq: ["{{password}}", db_password]


    - case_name: 用户输入错误密码登陆失败
      tags:
        - p2
      data:
        account: 13456725219
        cuName: U00tRzk3MzA=
        featureCode: efd3bfa68baea69842723798a679c782
        imageCode:
        latitude: "0.0"
        longitude: "0.0"
        msgType: "1"
        password: 325a2cc052914ceeb8c19016c091d2ac
        smsCode:
        smsToken:
        pushRegisterJson: "[{\"channel\":99}]"

      api_validate:
        - eq: [status_code, 200]
        - eq: [meta.code, 1015]
        - eq: [meta.message, "用户不存在或密码错误"]
        - is_null: [sessionInfo.sessionId]


- basicInfo:
    api_name: 客户端刷新登录
    url: /v3/apigateway/login
    method: put
    content_type: query
    headers:
      clientType: "3"
      featureCode: 8792188c8dcbe6d137d8f15307de8d5c
      refreshSession: ${rfSessionId}

  testcases:
    - case_name: 客户端传入有效rfSessionId登陆成功
      tags:
        - p0 # 用例等级：p0核心主流程（20%）、p1重要分支/边界（40%）、p2异常/容错（30%）、p3极端/探索（<10%，基本不自动化）
        - smoke # 冒烟
        - regression # 回归
      data:
        cuName: U00tRzk3MzA=
        featureCode: efd3bfa68baea69842723798a679c782
        pushRegisterJson: "[{\"channel\":99}]"
      file_name:

      api_validate:
        - eq: [status_code, 200]
        - eq: [meta.code, 200]
        - not_null: [sessionInfo.sessionId]
        - not_null: [sessionInfo.refreshSessionId]

      extracts:
        - sessionId: [sessionInfo.sessionId]

      setup: [case_setup1, case_setup2]
      teardown: [case_teardown1]